name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: checkboxes
    id: search-check
    attributes:
      label: Before submitting
      options:
        - label: I have searched for existing issues
          required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to replicate
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: App version and build number (e.g. 1.0.0 18)
      placeholder: "1.0.0 18"
    validations:
      required: true

  - type: input
    id: appletv-model
    attributes:
      label: Apple TV model
      description: Found in Settings → General → About (e.g. Apple TV 4K (3rd generation), Apple TV HD)
      placeholder: "Apple TV 4K (3rd generation)"
    validations:
      required: true

  - type: input
    id: tvos-version
    attributes:
      label: tvOS version
      description: Found in Settings → General → About (e.g. 18.2)
      placeholder: "18.2"
    validations:
      required: true

  - type: input
    id: plex-server-version
    attributes:
      label: Plex Media Server version
      description: Found in Plex Web → Settings → General (e.g. 1.41.3.9314). Enter "N/A" if the bug is unrelated to a Plex server.
      placeholder: "1.41.3.9314"
    validations:
      required: true

  - type: textarea
    id: additional-info
    attributes:
      label: Any additional info
      placeholder: Any other context about the bug
